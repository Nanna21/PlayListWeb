<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>내 버킷리스트 카드</title>
<style>
/* 기본 카드 디자인 */
.card {
width: 300px;
margin: 50px auto;
background: linear-gradient(135deg, #FF9A8B, #FDCB82, #4A90E2);
padding: 15px 15px 35px 15px;
border-radius: 2px 2px 15px 5px;
box-shadow: 3px 5px 15px rgba(0,0,0,0.15);
position: relative;
/* 포스트잇 느낌 */
transform: rotate(-3deg);
}
.card img {
width: 100%;
height: 200px;
object-fit: cover;
border-radius: 5px;
margin-bottom: 15px;
}
.card h2 {
color: #2c3e50;
font-size: 1.5rem;
margin-bottom: 10px;
}
.card p {
color: #444;
font-size: 1.1rem;
line-height: 1.5;
}
/* 1. 배지 (absolute) */
.badge {
position: absolute;
top: -10px;
right: -10px;
background: #ff4757;
color: white;
padding: 8px 12px;
font-size: 0.9rem;
font-weight: bold;
border-radius: 20px;
transform: rotate(10deg);
box-shadow: 2px 3px 8px rgba(0,0,0,0.2);
}
/* 2. 비밀 메모 */
.memo {
margin-top: 15px;
font-size: 0.9rem;
color: #555;
background: rgba(255,255,255,0.6);
padding: 8px;
border-radius: 5px;
visibility: hidden;
opacity: 0;
transition: 0.3s;
}
/* hover 시 등장 */
.card:hover .memo {
visibility: visible;
opacity: 1;
}
</style>
</head>
<body>
<div class="card">
<!-- 배지 -->
<div class="badge">Apple Park🏢</div>
<img src="https://images.unsplash.com/photo-1524046909351-84f69445d990?
q=80&w=1632&auto=format&fit=crop&ixlib=rb4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA==" alt="Apple Park">
<h2>😎 임성진의 꿈</h2>
<p>🍎 1. Apple Park 가보기</p>
<p>️ 2. 게임 만들기</p>
<!-- 비밀 메모 -->
<div class="memo">
🤫 TMI: 사실 애플 본사 가서 개발자들 보고 싶음
</div>
</div>
</body>
</html>
